<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate-900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- slate-950 -->
    </linearGradient>
    
    <!-- Accent Gradient for MD icon -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" /> <!-- sky-400 -->
      <stop offset="50%" stop-color="#6366f1" /> <!-- indigo-500 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- purple-500 -->
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- indigo-600 -->
      <stop offset="100%" stop-color="#0ea5e9" /> <!-- sky-500 -->
    </linearGradient>
  </defs>

  <!-- Rounded Outer Border with Glowing Effect -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="3" />

  <!-- Outer Ring glow -->
  <rect x="6" y="6" width="116" height="116" rx="24" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.3" />

  <!-- Markdown Icon ('M' and Arrow/Down) -->
  <g transform="translate(24, 32)">
    <!-- Main M shape -->
    <path d="M 0,48 L 0,0 L 16,16 L 32,0 L 32,48 L 22,48 L 22,18 L 16,24 L 10,18 L 10,48 Z" fill="url(#accentGrad)" />
    
    <!-- Arrow pointing down (representing conversion) -->
    <path d="M 58,12 L 70,12 L 70,0 L 78,0 L 78,12 L 90,12 L 74,28 Z" fill="#f8fafc" />
    
    <!-- Document background with lines representing Markdown text -->
    <rect x="54" y="36" width="30" height="4" rx="2" fill="#94a3b8" />
    <rect x="54" y="44" width="22" height="4" rx="2" fill="#94a3b8" />
  </g>
</svg>
